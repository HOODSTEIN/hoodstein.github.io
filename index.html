<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOODSTEIN</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #050816, #0b1026);
      color: white;
      text-align: center;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 30px 20px;
    }

    h1 {
      font-size: 48px;
      margin: 0 0 10px 0;
      letter-spacing: 3px;
      color: #4cc9ff;
      text-shadow: 0 0 20px #1ea7ff;
    }

    p {
      font-size: 20px;
      max-width: 700px;
      margin: 0 0 30px 0;
      color: #d8e6ff;
    }

    .button {
      display: inline-block;
      padding: 14px 28px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      background: #1e90ff;
      text-decoration: none;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(30, 144, 255, 0.5);
    }

    .button:hover {
      background: #3aa0ff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>HOODSTEIN</h1>
    <p>The official home of HOODSTEIN. Power. Lightning. Monster energy.</p>
    <a class="button" href="#">Enter the Universe</a>
  </div>
</body>
</html>
